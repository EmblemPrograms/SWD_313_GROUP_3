<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Group Selection - HotelHub</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  
  <style>
    .group-card {
      transition: all 0.3s ease;
      border: 2px solid transparent;
    }
    .group-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    }
    .group-card.selected {
      border-color: #007bff;
      background-color: #f8fbff;
    }
    .guest-input {
      font-size: 1.1rem;
    }
    .total-guests {
      font-size: 1.4rem;
      font-weight: bold;
      color: #007bff;
    }
  </style>
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">🏨 HotelHub</a>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        
        <div class="text-center mb-5">
          <h2 class="fw-bold">Group & Guest Selection</h2>
          <p class="lead text-muted">Tell us how many people are traveling so we can prepare the perfect stay for you.</p>
        </div>

        <!-- Selected Hotel Summary -->
        <div class="card mb-4" id="hotelSummary">
          <!-- Dynamically filled by JavaScript -->
        </div>

        <!-- Group Selection Form -->
        <div class="card shadow-sm">
          <div class="card-header bg-white">
            <h5 class="mb-0"><i class="fas fa-users me-2"></i> How many guests are staying?</h5>
          </div>
          <div class="card-body">

            <div class="row g-4">

              <!-- Adults -->
              <div class="col-md-4">
                <div class="group-card card h-100 p-4 text-center">
                  <i class="fas fa-user-tie fa-3x text-primary mb-3"></i>
                  <h5>Adults</h5>
                  <p class="text-muted small">Ages 13+</p>
                  <input type="number" id="adults" class="form-control text-center guest-input" value="2" min="1" max="10" onchange="updateTotal()">
                </div>
              </div>

              <!-- Children -->
              <div class="col-md-4">
                <div class="group-card card h-100 p-4 text-center">
                  <i class="fas fa-child fa-3x text-warning mb-3"></i>
                  <h5>Children</h5>
                  <p class="text-muted small">Ages 0 - 12</p>
                  <input type="number" id="children" class="form-control text-center guest-input" value="0" min="0" max="8" onchange="updateTotal()">
                </div>
              </div>

              <!-- Rooms -->
              <div class="col-md-4">
                <div class="group-card card h-100 p-4 text-center">
                  <i class="fas fa-bed fa-3x text-success mb-3"></i>
                  <h5>Rooms Needed</h5>
                  <p class="text-muted small">Based on group size</p>
                  <input type="number" id="rooms" class="form-control text-center guest-input" value="1" min="1" max="5" onchange="updateTotal()">
                </div>
              </div>

            </div>

            <!-- Total Summary -->
            <div class="mt-5 p-4 bg-light rounded text-center">
              <h5>Total Guests</h5>
              <h2 class="total-guests mb-0" id="totalGuests">2</h2>
              <small class="text-muted">guests • <span id="totalRooms">1</span> room(s)</small>
            </div>

          </div>
        </div>

        <!-- Navigation Buttons -->
        <div class="d-flex justify-content-between mt-5">
          <a href="hotels.html" class="btn btn-outline-secondary btn-lg px-5">
            ← Back to Hotels
          </a>
          <button onclick="proceedToBooking()" class="btn btn-primary btn-lg px-5">
            Continue to Booking <i class="fas fa-arrow-right ms-2"></i>
          </button>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    let selectedHotel = null;

    // Get hotel ID from URL
    function getHotelId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    }

    // Load selected hotel info
    async function loadHotelInfo() {
      const hotelId = getHotelId();
      if (!hotelId) {
        alert("No hotel selected. Please go back and choose a hotel.");
        window.location.href = "hotels.html";
        return;
      }

      try {
        const response = await fetch('data/hotels.json');
        const data = await response.json();
        selectedHotel = data.hotels.find(h => h.id == hotelId);

        if (!selectedHotel) throw new Error("Hotel not found");

        // Render hotel summary
        document.getElementById('hotelSummary').innerHTML = `
          <div class="row align-items-center">
            <div class="col-md-3">
              <img src="${selectedHotel.image}" class="img-fluid rounded" style="height: 140px; object-fit: cover;" alt="${selectedHotel.name}">
            </div>
            <div class="col-md-9">
              <h5>${selectedHotel.name}</h5>
              <p class="mb-1"><i class="fas fa-map-marker-alt text-muted"></i> ${selectedHotel.location}</p>
              <p class="text-muted small">${selectedHotel.description}</p>
            </div>
          </div>
        `;
      } catch (error) {
        console.error(error);
      }
    }

    // Update total guests and rooms in real-time
    function updateTotal() {
      const adults = parseInt(document.getElementById('adults').value) || 0;
      const children = parseInt(document.getElementById('children').value) || 0;
      const rooms = parseInt(document.getElementById('rooms').value) || 1;

      const totalGuests = adults + children;

      document.getElementById('totalGuests').textContent = totalGuests;
      document.getElementById('totalRooms').textContent = rooms;
    }

    // Proceed to full booking page
    function proceedToBooking() {
      const adults = document.getElementById('adults').value;
      const children = document.getElementById('children').value;
      const rooms = document.getElementById('rooms').value;
      const hotelId = getHotelId();

      // Save group data
      localStorage.setItem('groupSelection', JSON.stringify({
        adults: adults,
        children: children,
        rooms: rooms
      }));

      // Redirect to booking page with hotel ID
      window.location.href = `booking.html?id=${hotelId}`;
    }

    // Initialize page
    window.onload = loadHotelInfo;
  </script>
</body>
</html>
