<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Special Deals - HotelHub</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  
  <style>
    .deal-card {
      transition: all 0.3s ease;
      border: 2px solid #ffc107;
    }
    .deal-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    }
    .discount-badge {
      position: absolute;
      top: 15px;
      right: 15px;
      background: #dc3545;
      color: white;
      padding: 5px 12px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 0.9rem;
    }
    .original-price {
      text-decoration: line-through;
      color: #6c757d;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold fs-3" href="index.html">🏨 HotelHub</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="hotels.html">Hotels</a></li>
          <li class="nav-item"><a class="nav-link active" href="deals.html">Deals</a></li>
          <li class="nav-item"><a class="nav-link disabled" href="#">My Bookings</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="text-center mb-5">
      <h2 class="display-5 fw-bold">🔥 Special Deals & Offers</h2>
      <p class="lead text-muted">Limited time offers - Book now and save big!</p>
    </div>

    <div class="row" id="dealsContainer">
      <!-- Deals will be loaded by JavaScript -->
    </div>

    <!-- Limited Time Banner -->
    <div class="alert alert-warning text-center mt-5">
      <strong>⏰ Offer ends in 7 days!</strong> Prices are subject to change. Book fast!
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    async function loadDeals() {
      try {
        const response = await fetch('data/hotels.json');
        const data = await response.json();
        const hotels = data.hotels;

        const container = document.getElementById('dealsContainer');
        container.innerHTML = '';

        // Show all hotels as deals with discounts
        hotels.forEach(hotel => {
          // Generate random discount between 15% to 35%
          const discount = Math.floor(Math.random() * 21) + 15;
          const discountedPrice = Math.floor(hotel.pricePerNight * (1 - discount/100));

          const card = `
            <div class="col-md-6 col-lg-4 mb-4">
              <div class="card deal-card h-100 position-relative">
                <span class="discount-badge">-${discount}%</span>
                
                <img src="${hotel.image}" class="card-img-top" style="height: 230px; object-fit: cover;" alt="${hotel.name}">
                
                <div class="card-body">
                  <h5 class="card-title">${hotel.name}</h5>
                  <p class="text-muted mb-2">
                    <i class="fas fa-map-marker-alt"></i> ${hotel.location}
                  </p>

                  <div class="mb-3">
                    <span class="rating text-warning">${'★'.repeat(Math.floor(hotel.rating))}</span>
                    <span class="ms-2">${hotel.rating}</span>
                  </div>

                  <div class="d-flex justify-content-between align-items-center">
                    <div>
                      <small class="text-muted">Now at</small><br>
                      <h4 class="text-success mb-0">₦${discountedPrice.toLocaleString()}</h4>
                      <small class="original-price">₦${hotel.pricePerNight.toLocaleString()}</small>
                    </div>
                    <a href="group-selection.html?id=${hotel.id}" class="btn btn-primary">Book Now</a>
                  </div>
                </div>

                <div class="card-footer text-center bg-light">
                  <small class="text-danger fw-bold">
                    <i class="fas fa-fire"></i> Limited Time Offer
                  </small>
                </div>
              </div>
            </div>`;
          
          container.innerHTML += card;
        });

      } catch (error) {
        console.error("Error loading deals:", error);
        document.getElementById('dealsContainer').innerHTML = `
          <div class="col-12 text-center">
            <div class="alert alert-danger">Failed to load special deals.</div>
          </div>`;
      }
    }

    // Load deals when page opens
    window.onload = loadDeals;
  </script>
</body>
</html>
