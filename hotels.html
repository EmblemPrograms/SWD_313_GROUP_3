<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Available Hotels - Book Now</title>
  
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  
  <style>
    .hotel-card {
      transition: all 0.3s ease;
      border: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .hotel-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.15);
    }
    .hotel-img {
      height: 220px;
      object-fit: cover;
    }
    .rating {
      color: #ffc107;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">🏨 HotelHub</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="hotels.html">Hotels</a></li>
          <li class="nav-item"><a class="nav-link" href="booking.html">My Bookings</a></li>
          <li class="nav-item"><a class="nav-link" href="team.html">Our Team</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <h2 class="mb-4">Search Results</h2>

    <!-- Filters -->
    <div class="row mb-4">
      <div class="col-md-3">
        <input type="text" id="searchInput" class="form-control" placeholder="Search by hotel name or location...">
      </div>
      <div class="col-md-2">
        <select id="locationFilter" class="form-select">
          <option value="">All Locations</option>
          <option value="Lagos">Lagos</option>
          <option value="Abuja">Abuja</option>
          <option value="Ibadan">Ibadan</option>
          <option value="Calabar">Calabar</option>
        </select>
      </div>
      <div class="col-md-2">
        <select id="priceFilter" class="form-select">
          <option value="">Price Range</option>
          <option value="20000">Below ₦20,000</option>
          <option value="30000">₦20,000 - ₦40,000</option>
          <option value="50000">Above ₦40,000</option>
        </select>
      </div>
      <div class="col-md-2">
        <select id="ratingFilter" class="form-select">
          <option value="">Any Rating</option>
          <option value="4">4+ Stars</option>
          <option value="4.5">4.5+ Stars</option>
        </select>
      </div>
      <div class="col-md-3">
        <button class="btn btn-primary w-100" onclick="filterHotels()">🔍 Apply Filters</button>
      </div>
    </div>

    <!-- Hotels Grid -->
    <div class="row" id="hotelsContainer">
      <!-- Hotels will be loaded here by JavaScript -->
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    let allHotels = [];

    // Fetch hotels from JSON
    async function loadHotels() {
      try {
        const response = await fetch('data/hotels.json');
        const data = await response.json();
        allHotels = data.hotels;
        displayHotels(allHotels);
      } catch (error) {
        console.error("Error loading hotels:", error);
        document.getElementById('hotelsContainer').innerHTML = `
          <div class="alert alert-danger">Failed to load hotels. Please try again later.</div>`;
      }
    }

    // Display hotels as cards
    function displayHotels(hotels) {
      const container = document.getElementById('hotelsContainer');
      container.innerHTML = '';

      if (hotels.length === 0) {
        container.innerHTML = `<div class="col-12 text-center"><h5>No hotels found matching your criteria.</h5></div>`;
        return;
      }

      hotels.forEach(hotel => {
        const card = `
          <div class="col-md-6 col-lg-4 mb-4">
            <div class="card hotel-card h-100">
              <img src="${hotel.image}" class="card-img-top hotel-img" alt="${hotel.name}">
              <div class="card-body">
                <div class="d-flex justify-content-between align-items-start">
                  <h5 class="card-title">${hotel.name}</h5>
                  <span class="badge bg-success">${hotel.type}</span>
                </div>
                
                <p class="text-muted mb-1">
                  <i class="fas fa-map-marker-alt"></i> ${hotel.location}
                </p>
                
                <div class="mb-2">
                  <span class="rating">${'★'.repeat(Math.floor(hotel.rating))}</span>
                  <span class="ms-2 fw-bold">${hotel.rating}</span>
                  <small class="text-muted">(${hotel.reviews} reviews)</small>
                </div>

                <p class="card-text text-truncate">${hotel.description}</p>

                <div class="d-flex justify-content-between align-items-end">
                  <div>
                    <small class="text-muted">Starting from</small><br>
                    <h5 class="text-primary mb-0">₦${hotel.pricePerNight.toLocaleString()}</h5>
                    <small class="text-muted">per night</small>
                  </div>
                  <a href="group-selection.html?id=${hotel.id}" class="btn btn-primary">Book Now</a>
                </div>
              </div>
            </div>
          </div>`;
        container.innerHTML += card;
      });
    }

    // Filter function
    function filterHotels() {
      const searchText = document.getElementById('searchInput').value.toLowerCase();
      const location = document.getElementById('locationFilter').value;
      const priceRange = document.getElementById('priceFilter').value;
      const minRating = parseFloat(document.getElementById('ratingFilter').value);

      const filtered = allHotels.filter(hotel => {
        const matchesSearch = hotel.name.toLowerCase().includes(searchText) || 
                             hotel.location.toLowerCase().includes(searchText);
        
        const matchesLocation = !location || hotel.location.includes(location);
        
        let matchesPrice = true;
        if (priceRange) {
          if (priceRange === "20000") matchesPrice = hotel.pricePerNight < 20000;
          else if (priceRange === "30000") matchesPrice = hotel.pricePerNight >= 20000 && hotel.pricePerNight <= 40000;
          else if (priceRange === "50000") matchesPrice = hotel.pricePerNight > 40000;
        }

        const matchesRating = !minRating || hotel.rating >= minRating;

        return matchesSearch && matchesLocation && matchesPrice && matchesRating;
      });

      displayHotels(filtered);
    }

    // Load hotels when page loads
    window.onload = loadHotels;
  </script>
</body>
</html>
